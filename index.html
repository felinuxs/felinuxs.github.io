<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" id="themeColorMeta" content="#ffffff">
    <link rel="manifest" href="data:application/manifest+json,{}" id="manifestLink">
    <title>JAM POS · Tienda Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        *{transition:all .2s ease;user-select:none;-webkit-tap-highlight-color:transparent;box-sizing:border-box}
        body{font-family:'Inter',system-ui,sans-serif;margin:0;padding:0;min-height:100vh}
        .main-container{max-width:100%;margin:0 auto;padding:0;min-height:100vh}
        .page-header-fixed{position:sticky;top:0;z-index:100;background:inherit;padding:12px 8px;margin-bottom:16px}
        .page-container,.home-container{padding:0 12px 20px 12px}
        .btn-redondeado{border-radius:40px!important;padding:8px 16px!important;font-weight:600!important;cursor:pointer!important;border:none!important}
        .btn-redondeado:active{transform:scale(.96)}
        
        /* Botones compactos */
        .btn-editar-redondeado, .btn-eliminar-redondeado, .btn-verde-redondeado {
            padding: 4px 10px !important;
            font-size: 0.7rem !important;
            font-weight: 500 !important;
            border-radius: 20px !important;
            display: inline-flex !important;
            align-items: center !important;
            gap: 4px !important;
        }
        .btn-editar-redondeado i, .btn-eliminar-redondeado i, .btn-verde-redondeado i {
            font-size: 0.65rem !important;
        }
        .btn-editar-redondeado{background:#f97316!important;color:#fff!important}
        .btn-eliminar-redondeado{background:#ef4444!important;color:#fff!important}
        .btn-verde-redondeado{background:#10b981!important;color:#fff!important}
        .btn-azul-redondeado{background:var(--accent)!important;color:#fff!important;padding:8px 16px!important;font-weight:600!important}
        
        /* Botón finalizar venta - más grande y centrado */
        .btn-finalizar-venta {
            background: #10b981 !important;
            color: white !important;
            padding: 14px 24px !important;
            font-size: 1.1rem !important;
            font-weight: 700 !important;
            border-radius: 50px !important;
            width: 100% !important;
            max-width: 300px !important;
            display: block !important;
            margin: 20px auto 0 auto !important;
            cursor: pointer !important;
            border: none !important;
            transition: transform 0.08s linear !important;
            text-align: center !important;
        }
        .btn-finalizar-venta:active { transform: scale(0.97); }
        
        .main-module-btn{display:flex;align-items:center;justify-content:center;gap:12px;height:60px;border-radius:20px;font-weight:700;font-size:1rem;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.1);border:none;width:100%}
        .main-module-btn:active{transform:scale(.97);filter:brightness(.92)}
        .main-module-btn i{font-size:1.3rem}
        .card-bcv{border-radius:24px;padding:12px;text-align:center;margin-bottom:20px;border:2px solid var(--accent);position:relative}
        .led-converter{position:absolute;top:10px;right:12px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
        .btn-back{border-radius:40px;padding:8px 18px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;cursor:pointer;background:rgba(0,0,0,.1)}
        .btn-back-bloqueado{background:#dc2626!important;color:#fff!important;cursor:not-allowed!important}
        .module-title{font-size:1.5rem;font-weight:800;color:var(--accent);cursor:pointer;padding:4px 8px;border-radius:16px}
        .module-title-bloqueado{text-decoration:underline wavy #dc2626;text-underline-offset:8px}
        .product-card,.client-card{border-radius:20px;padding:14px;margin-bottom:12px;border:2px solid var(--accent);word-break:break-word}
        input,select,textarea{border-radius:20px;padding:10px 14px;width:100%;outline:none}
        .modal-form{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
        .modal-form-content{max-width:460px;width:100%;border-radius:28px;padding:20px;max-height:85vh;overflow:auto}
        .color-circle{width:40px;height:40px;border-radius:50%;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,.2)}
        .ticket-line{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed #ddd}
        .scroll-area{max-height:60vh;overflow:auto}
        .config-section{border:2px solid var(--accent);border-radius:20px;padding:12px;margin-bottom:20px}
        .bg-option{width:80px;height:80px;border-radius:16px;cursor:pointer;border:2px solid transparent;text-align:center;padding-top:25px;font-weight:bold}
        .bg-option.selected{border-color:var(--accent);transform:scale(1.02)}
        .module-header{display:flex;justify-content:space-between;align-items:center}
        .install-btn{position:fixed;bottom:20px;right:20px;z-index:9999;border-radius:50px;padding:10px 20px;font-weight:bold;box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:pointer}
        .home-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:4px}
        
        /* Ticket virtual estilo térmico */
        .ticket-virtual {
            font-family: 'Courier New', 'Courier', monospace;
            font-size: 12px;
            line-height: 1.4;
            width: 280px;
            background: white;
            color: black;
            padding: 15px;
            border-radius: 8px;
            margin: 0 auto;
        }
        .ticket-virtual .header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 8px; margin-bottom: 8px; }
        .ticket-virtual .header h3 { margin: 0; font-size: 16px; }
        .ticket-virtual .header p { margin: 2px 0; font-size: 10px; }
        .ticket-virtual .items { border-bottom: 1px dashed #000; padding-bottom: 8px; margin-bottom: 8px; }
        .ticket-virtual .item { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .ticket-virtual .total { font-weight: bold; border-top: 1px dashed #000; padding-top: 8px; margin-top: 8px; }
        .ticket-virtual .footer { text-align: center; border-top: 1px dashed #000; padding-top: 8px; margin-top: 8px; font-size: 9px; }
        
        /* Botones ticket */
        .ticket-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .ticket-btn { padding: 8px 16px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
        .btn-wa { background: #25D366; color: white; }
        .btn-img { background: #3b82f6; color: white; }
        .btn-copy { background: #6b7280; color: white; }
        
        /* Temas */
        body.light-mode{background:#fff}
        body.light-mode .main-container, body.light-mode .page-container, body.light-mode .card-bcv, body.light-mode .product-card, body.light-mode .client-card, body.light-mode .modal-form-content, body.light-mode .home-container{background:#fff!important;color:#1e1e1e!important}
        body.light-mode input, body.light-mode select, body.light-mode textarea, body.light-mode .btn-back{background:#fff;color:#1e1e1e;border-color:#e2e8f0}
        body.light-mode .main-module-btn{background:var(--accent)!important;color:#fff!important}
        body.light-mode .main-module-btn i{color:#fff!important}
        body.light-mode .led-converter{background:var(--accent)}
        body.light-mode .led-converter i{color:#fff!important}
        body.light-mode #globalResults, body.light-mode .global-result{background:#fff!important;color:#1e1e1e!important;border-color:#e2e8f0!important}
        
        body.gray-mode{background:#2c2c2c}
        body.gray-mode .main-container, body.gray-mode .page-container, body.gray-mode .card-bcv, body.gray-mode .product-card, body.gray-mode .client-card, body.gray-mode .modal-form-content, body.gray-mode .home-container{background:#3a3a3a!important;color:#f0f0f0!important}
        body.gray-mode input, body.gray-mode select, body.gray-mode textarea, body.gray-mode .btn-back{background:#4a4a4a!important;color:#f0f0f0!important;border-color:#6a6a6a!important}
        body.gray-mode .main-module-btn{background:var(--accent)!important;color:#fff!important}
        body.gray-mode .main-module-btn i{color:#fff!important}
        body.gray-mode .led-converter{background:var(--accent)}
        body.gray-mode .led-converter i{color:#fff!important}
        body.gray-mode #globalResults, body.gray-mode .global-result{background:#4a4a4a!important;color:#f0f0f0!important;border-color:#6a6a6a!important}
        
        body.dark-mode{background:#000!important}
        body.dark-mode .main-container, body.dark-mode .page-container, body.dark-mode .card-bcv, body.dark-mode .product-card, body.dark-mode .client-card, body.dark-mode .modal-form-content, body.dark-mode .home-container{background:#0a0a0a!important;color:#e0e0e0!important}
        body.dark-mode input, body.dark-mode select, body.dark-mode textarea, body.dark-mode .btn-back{background:#1a1a1a!important;color:#e0e0e0!important;border-color:#3a3a3a!important}
        body.dark-mode .main-module-btn{background:var(--accent)!important;color:#000!important}
        body.dark-mode .main-module-btn i{color:#000!important}
        body.dark-mode .led-converter{background:var(--accent)}
        body.dark-mode .led-converter i{color:#000!important}
        body.dark-mode #globalResults, body.dark-mode .global-result{background:#1a1a1a!important;color:#e0e0e0!important;border-color:#3a3a3a!important}
        
        ::-webkit-scrollbar{width:6px}
    </style>
</head>
<body><div class="main-container" id="appRoot"></div>
<script>
    // ==================== UTILIDADES ====================
    const escapeHtml = s => s ? s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) : '';
    const fmtPrecio = v => Number(v).toLocaleString('es-VE', {minimumFractionDigits:2, maximumFractionDigits:2});
    const esOscuro = c => { let r=parseInt(c.slice(1,3),16), g=parseInt(c.slice(3,5),16), b=parseInt(c.slice(5,7),16); return(.299*r + .587*g + .114*b) < 128; };
    
    // ==================== INDEXEDDB ====================
    let db = null;
    const DB_NAME = 'PosTiendaDB', DB_VERSION = 30;
    const initDB = () => new Promise((res,rej) => { let r = indexedDB.open(DB_NAME, DB_VERSION); r.onerror = () => rej(r.error); r.onsuccess = () => { db = r.result; res(db); }; r.onupgradeneeded = e => { let d = e.target.result; ['productos','clientes','proveedores','gastos','empleados','ventas','config'].forEach(s => { if(!d.objectStoreNames.contains(s)) d.createObjectStore(s, {keyPath:'id'}); }); }; });
    const getStore = (s, m='readonly') => db.transaction(s, m).objectStore(s);
    const getAll = async s => new Promise(res => { getStore(s).getAll().onsuccess = e => res(e.target.result || []); });
    const saveItem = async (s, o) => { let tx = db.transaction(s, 'readwrite'); tx.objectStore(s).put(o); await tx.done; };
    const deleteItem = async (s, id) => { let tx = db.transaction(s, 'readwrite'); tx.objectStore(s).delete(id); await tx.done; };
    
    // ==================== DATOS GLOBALES ====================
    let D = {
        productos: [], clientes: [], proveedores: [], gastos: [], empleados: [], ventas: [],
        config: { key:'mainConfig', theme:'#3b82f6', dolarRate:67.85, lastUpdate:new Date().toLocaleDateString(), ivaActivo:true, usarMargen:false, backgroundMode:'light' }
    };
    let exitAttempts = 0, currentModule = 'home', volverBloqueado = false, timeoutTitulo = null;
    let carrito = [], totalVenta = 0, tipoPago = 'pago_movil';
    
    async function loadAllData(){
        for(let s of ['productos','clientes','proveedores','gastos','empleados','ventas']) D[s] = await getAll(s);
        let cfg = await getAll('config'); if(cfg.length > 0) D.config = cfg[0];
        if(!D.config.backgroundMode) D.config.backgroundMode = 'light';
        if(esOscuro(D.config.theme)) D.config.backgroundMode = 'light';
        if(D.productos.length === 0){
            let init = [
                {id:"p1", nombre:"Café Gourmet 500g", categoria:"Alimentos", precioVentaBs:58.5, precioVentaUsd:.86, stock:24, codigo:"CAF001", proveedor:"Distribuidora Central", costoRealBs:38},
                {id:"p2", nombre:"Arroz Primor 1kg", categoria:"Granos", precioVentaBs:32, precioVentaUsd:.47, stock:42, codigo:"ARR002", proveedor:"Alimentos del Valle", costoRealBs:20},
                {id:"p3", nombre:"Leche Pasteurizada 1L", categoria:"Lácteos", precioVentaBs:24.5, precioVentaUsd:.36, stock:15, codigo:"LEC003", proveedor:"Lácteos Los Andes", costoRealBs:16.5}
            ];
            for(let p of init) await saveItem('productos', p);
            D.productos = init;
        }
        if(D.clientes.length === 0){
            let c = {id:"c1", cedula:"V-12345678", nombre:"María Rodríguez", telefono:"0412-5551234", direccion:"Av. Principal #23", email:"maria@mail.com"};
            await saveItem('clientes', c); D.clientes = [c];
        }
        applyTheme(); await saveConfig();
    }
    async function saveConfig(){ await saveItem('config', D.config); applyTheme(); }
    function applyTheme(){
        document.documentElement.style.setProperty('--accent', D.config.theme);
        document.body.className = '';
        document.body.classList.add(`${D.config.backgroundMode}-mode`);
        document.getElementById('themeColorMeta')?.setAttribute('content', D.config.backgroundMode === 'light' ? '#ffffff' : (D.config.backgroundMode === 'gray' ? '#2c2c2c' : '#000000'));
    }
    async function actualizarTasa(){
        try{
            let r = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            let d = await r.json();
            if(d?.rates?.VES){
                D.config.dolarRate = parseFloat(d.rates.VES.toFixed(2));
                D.config.lastUpdate = new Date().toLocaleDateString();
                await saveConfig();
            }
        }catch(e){}
        let span = document.getElementById('tasaDolarMostrar');
        if(span) span.innerText = fmtPrecio(D.config.dolarRate);
    }
    
    // ==================== TICKET VIRTUAL ====================
    function mostrarTicket(venta) {
        const itemsHtml = venta.items.map(item => 
            `<div class="item"><span>${item.cantidad}x ${escapeHtml(item.nombre)}</span><span>${fmtPrecio(item.subtotal)} Bs</span></div>`
        ).join('');
        
        const formasPago = {
            'efectivo_bs': 'EFECTIVO Bs',
            'pago_movil': 'PAGO MÓVIL',
            'transferencia': 'TRANSFERENCIA',
            'tarjeta_debito': 'TARJETA DÉBITO',
            'dolares': 'DÓLARES'
        };
        
        const ticketHtml = `
            <div class="ticket-virtual" id="ticketParaImprimir">
                <div class="header">
                    <h3>JAM POS</h3>
                    <p>${new Date(venta.fecha).toLocaleString()}</p>
                    <p>Ticket: ${venta.id}</p>
                    <p>Cliente: ${escapeHtml(venta.cliente)}</p>
                </div>
                <div class="items">
                    ${itemsHtml}
                </div>
                <div class="ticket-line"><span>SUBTOTAL</span><span>${fmtPrecio(venta.subtotal)} Bs</span></div>
                ${venta.iva ? `<div class="ticket-line"><span>IVA (16%)</span><span>${fmtPrecio(venta.iva)} Bs</span></div>` : ''}
                <div class="ticket-line total"><span>TOTAL</span><span>${fmtPrecio(venta.total)} Bs</span></div>
                <div class="ticket-line"><span>PAGO</span><span>${fmtPrecio(venta.pago)} Bs</span></div>
                <div class="ticket-line"><span>CAMBIO</span><span>${fmtPrecio(venta.cambio)} Bs</span></div>
                <div class="ticket-line"><span>FORMA DE PAGO</span><span>${formasPago[venta.tipoPago] || venta.tipoPago}</span></div>
                <div class="footer">
                    <p>¡Gracias por su compra!</p>
                    <p>JAM POS - Sistema Profesional</p>
                </div>
            </div>
            <div class="ticket-buttons">
                <button class="ticket-btn btn-wa" onclick="window.enviarTicketPorWhatsApp('${venta.id}')"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                <button class="ticket-btn btn-img" onclick="window.descargarTicketImagen()"><i class="fas fa-download"></i> Imagen</button>
                <button class="ticket-btn btn-copy" onclick="window.copiarTicketTexto()"><i class="fas fa-copy"></i> Copiar</button>
            </div>
        `;
        
        const modal = document.createElement('div'); modal.className = 'modal-form';
        modal.innerHTML = `<div class="modal-form-content" style="max-width: 350px; text-align: center;">${ticketHtml}</div>`;
        document.body.appendChild(modal);
        
        window.ticketActual = venta;
        window.modalTicketActual = modal;
        modal.onclick = e => { if(e.target === modal) modal.remove(); };
    }
    
    window.enviarTicketPorWhatsApp = (ventaId) => {
        const venta = D.ventas.find(v => v.id === ventaId);
        if(!venta) return;
        
        const formasPago = {
            'efectivo_bs': 'EFECTIVO Bs',
            'pago_movil': 'PAGO MÓVIL',
            'transferencia': 'TRANSFERENCIA',
            'tarjeta_debito': 'TARJETA DÉBITO',
            'dolares': 'DÓLARES'
        };
        
        let mensaje = `🏪 *JAM POS - TICKET DE COMPRA* 🏪\n`;
        mensaje += `📅 ${new Date(venta.fecha).toLocaleString()}\n`;
        mensaje += `🧾 *${venta.id}*\n`;
        mensaje += `👤 Cliente: ${venta.cliente}\n`;
        mensaje += `━━━━━━━━━━━━━━━━━━━━\n`;
        venta.items.forEach(item => {
            mensaje += `${item.cantidad}x ${item.nombre} → ${fmtPrecio(item.subtotal)} Bs\n`;
        });
        mensaje += `━━━━━━━━━━━━━━━━━━━━\n`;
        mensaje += `💰 *SUBTOTAL:* ${fmtPrecio(venta.subtotal)} Bs\n`;
        if(venta.iva) mensaje += `📊 *IVA:* ${fmtPrecio(venta.iva)} Bs\n`;
        mensaje += `💵 *TOTAL:* ${fmtPrecio(venta.total)} Bs\n`;
        mensaje += `💸 *PAGO:* ${fmtPrecio(venta.pago)} Bs\n`;
        mensaje += `🔄 *CAMBIO:* ${fmtPrecio(venta.cambio)} Bs\n`;
        mensaje += `💳 *FORMA DE PAGO:* ${formasPago[venta.tipoPago] || venta.tipoPago}\n`;
        mensaje += `━━━━━━━━━━━━━━━━━━━━\n`;
        mensaje += `🙏 ¡Gracias por su compra!\n`;
        mensaje += `🏪 JAM POS - Tu tienda profesional`;
        
        const telefono = prompt("📱 Ingrese el número de teléfono (ej: 584121234567 o 04121234567):");
        if(telefono) {
            let numeroLimpio = telefono.replace(/[^0-9]/g, '');
            if(numeroLimpio.startsWith('0')) numeroLimpio = '58' + numeroLimpio.substring(1);
            if(!numeroLimpio.startsWith('58')) numeroLimpio = '58' + numeroLimpio;
            const url = `https://wa.me/${numeroLimpio}?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        }
    };
    
    window.descargarTicketImagen = async () => {
        const ticket = document.getElementById('ticketParaImprimir');
        if(!ticket) return;
        try {
            const canvas = await html2canvas(ticket, { scale: 2, backgroundColor: '#ffffff' });
            const link = document.createElement('a');
            link.download = `ticket_${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        } catch(e) { alert('Error al generar imagen'); }
    };
    
    window.copiarTicketTexto = () => {
        const ticket = document.getElementById('ticketParaImprimir');
        if(!ticket) return;
        const texto = ticket.innerText;
        navigator.clipboard.writeText(texto).then(() => alert('✓ Ticket copiado al portapapeles')).catch(() => alert('Error al copiar'));
    };
    
    // ==================== NAVEGACIÓN Y BLOQUEO ====================
    window.navigateTo = m => {
        if(volverBloqueado && currentModule !== 'home') return;
        exitAttempts = 0; volverBloqueado = false;
        if(timeoutTitulo) clearTimeout(timeoutTitulo);
        currentModule = m;
        if(m === 'ventas') renderVentas();
        else if(m === 'inventario') renderInventario();
        else if(m === 'clientes') renderCrud('clientes', 'Clientes', ['cedula','nombre','telefono','direccion','email']);
        else if(m === 'proveedores') renderCrud('proveedores', 'Proveedores', ['rif','nombre','telefono','contacto','direccion']);
        else if(m === 'gastos') renderCrud('gastos', 'Gastos', ['concepto','montoBs','categoria','fecha']);
        else if(m === 'empleados') renderCrud('empleados', 'Empleados', ['cedula','nombre','cargo','salarioBs','fechaContrato']);
        else if(m === 'reportes') renderReportes();
        else if(m === 'config') renderConfig();
    };
    window.backToHome = () => { if(!volverBloqueado){ exitAttempts = 0; renderHome(); } };
    window.iniciarBloqueo = (el, nombre) => {
        if(timeoutTitulo) clearTimeout(timeoutTitulo);
        timeoutTitulo = setTimeout(() => {
            volverBloqueado = !volverBloqueado;
            if(el) el.classList.toggle('module-title-bloqueado', volverBloqueado);
            let btn = document.getElementById('btnVolverModule');
            if(btn){
                if(volverBloqueado){
                    btn.classList.add('btn-back-bloqueado');
                    btn.innerHTML = '<i class="fas fa-lock"></i> Bloqueado';
                    btn.onclick = () => {};
                } else {
                    btn.classList.remove('btn-back-bloqueado');
                    btn.innerHTML = '<i class="fas fa-arrow-left"></i> Volver';
                    btn.onclick = () => window.backToHome();
                }
            }
            timeoutTitulo = null;
        }, 2000);
    };
    window.cancelarBloqueo = () => { if(timeoutTitulo){ clearTimeout(timeoutTitulo); timeoutTitulo = null; } };
    
    // ==================== PANTALLA PRINCIPAL ====================
    function renderHome(){
        currentModule = 'home'; volverBloqueado = false;
        let accent = D.config.theme;
        let modulos = [
            {icon:"fa-shopping-cart", label:"Ventas", id:"ventas"},
            {icon:"fa-boxes", label:"Inventario", id:"inventario"},
            {icon:"fa-users", label:"Clientes", id:"clientes"},
            {icon:"fa-truck", label:"Proveedores", id:"proveedores"},
            {icon:"fa-coins", label:"Gastos", id:"gastos"},
            {icon:"fa-user-tie", label:"Empleados", id:"empleados"},
            {icon:"fa-chart-line", label:"Reportes", id:"reportes"},

    async function globalSearch(term){
        let div = document.getElementById('globalResults');
        if(term.length < 2){ div.classList.add('hidden'); return; }
        let lower = term.toLowerCase();
        let prod = D.productos.filter(p => p.nombre.toLowerCase().includes(lower) || (p.codigo && p.codigo.toLowerCase().includes(lower)));
        let cli = D.clientes.filter(c => c.nombre.toLowerCase().includes(lower));
        let html = '';
        prod.slice(0,5).forEach(p => {
            html += `<div class="global-result p-3 cursor-pointer border-b" style="border-bottom-color:var(--accent);">
                        <div class="font-bold">${escapeHtml(p.nombre)}</div>
                        <div class="text-sm flex justify-between flex-wrap">
                            <span>💰 ${fmtPrecio(p.precioVentaBs)} Bs</span>
                            <span>💵 $${p.precioVentaUsd}</span>
                            <span>📦 Stock: ${p.stock}</span>
                        </div>
                        <div class="flex gap-2 mt-2">
                            <button onclick="event.stopPropagation();editarProductoDesdeBusqueda('${p.id}')" class="btn-editar-redondeado">✏️ Editar</button>
                            <button onclick="event.stopPropagation();venderProductoDesdeBusqueda('${p.id}')" class="btn-verde-redondeado">🛒 Vender</button>
                        </div>
                    </div>`;
        });
        cli.slice(0,3).forEach(c => html += `<div class="global-result p-3 cursor-pointer" onclick="alert('👤 ${escapeHtml(c.nombre)} - ${escapeHtml(c.cedula||'')}')"><i class="fas fa-user mr-2"></i>${escapeHtml(c.nombre)}</div>`);
        if(!html) html = '<div class="p-3 text-center">Sin resultados</div>';
        div.innerHTML = html; div.classList.remove('hidden');
        let close = e => { if(!div.contains(e.target) && e.target !== document.getElementById('searchGlobalInput')){ div.classList.add('hidden'); document.removeEventListener('click', close); } };
        setTimeout(() => document.addEventListener('click', close), 100);
    }
    window.editarProductoDesdeBusqueda = id => mostrarFormProducto(id, true);
    window.venderProductoDesdeBusqueda = id => { navigateTo('ventas'); setTimeout(() => agregarAlCarrito(id), 100); };
    window.mostrarConvertidor = () => {
        let m = document.createElement('div'); m.className = 'modal-form';
        m.innerHTML = `<div class="modal-form-content"><h3 class="font-bold text-lg mb-3">🔄 Convertidor Bs ↔ USD</h3><div class="mb-3"><label>Bolívares (Bs)</label><input type="number" id="bsInput" placeholder="Bs" class="border p-2 rounded w-full"></div><div class="mb-3"><label>Dólares (USD)</label><input type="number" id="usdInput" placeholder="USD" class="border p-2 rounded w-full"></div><p class="text-sm">Tasa: 1 USD = ${fmtPrecio(D.config.dolarRate)} Bs</p><button id="closeConv" class="mt-3 w-full py-2 rounded-xl bg-gray-200">Cerrar</button></div>`;
        document.body.appendChild(m);
        let bs = document.getElementById('bsInput'), usd = document.getElementById('usdInput');
        bs.oninput = () => { if(bs.value) usd.value = (parseFloat(bs.value) / D.config.dolarRate).toFixed(2); };
        usd.oninput = () => { if(usd.value) bs.value = (parseFloat(usd.value) * D.config.dolarRate).toFixed(2); };
        document.getElementById('closeConv').onclick = () => m.remove();
    };

    function buscarProductos(term){
        let sug = document.getElementById('sugerencias');
        if(term.length < 2){ sug.classList.add('hidden'); return; }
        let filt = D.productos.filter(p => p.nombre.toLowerCase().includes(term.toLowerCase()) || (p.codigo && p.codigo.toLowerCase().includes(term.toLowerCase())));
        if(!filt.length){ sug.classList.add('hidden'); return; }
        sug.innerHTML = filt.map(p => `<div class="p-2 hover:bg-gray-100 cursor-pointer rounded-xl" onclick="agregarAlCarrito('${p.id}')">${escapeHtml(p.nombre)} | ${fmtPrecio(p.precioVentaBs)} Bs | Stock: ${p.stock}</div>`).join('');
        sug.classList.remove('hidden');
    }
    window.agregarAlCarrito = id => {
        let prod = D.productos.find(p => p.id === id);
        if(prod && prod.stock > 0){
            let ex = carrito.find(c => c.id === id);
            if(ex) ex.cantidad++;
            else carrito.push({...prod, cantidad:1});
            actualizarCarritoUI();
            document.getElementById('buscarProducto').value = '';
            document.getElementById('sugerencias').classList.add('hidden');
        }
    };
    function actualizarCarritoUI(){
        let cont = document.getElementById('carritoLista'), sub = document.getElementById('subtotal'), tot = document.getElementById('total'), ivaSpan = document.getElementById('iva');
        if(!cont) return;
        if(carrito.length === 0){
            cont.innerHTML = '<div class="text-center py-2">Vacío</div>';
            sub.innerText = '0,00 Bs'; tot.innerText = '0,00 Bs';
            if(ivaSpan) ivaSpan.innerText = '0,00 Bs';
            totalVenta = 0; return;
        }
        let suma = 0, html = '';
        carrito.forEach((it,i) => {
            let subit = it.precioVentaBs * it.cantidad;
            suma += subit;
            html += `<div class="flex justify-between text-sm py-1"><div>${escapeHtml(it.nombre)} x${it.cantidad}</div><div>${fmtPrecio(subit)} Bs <button onclick="eliminarDelCarrito(${i})" class="text-red-500 ml-2"><i class="fas fa-trash"></i></button></div></div>`;
        });
        cont.innerHTML = html;
        let iva = D.config.ivaActivo ? suma * 0.16 : 0, total = suma + iva;
        sub.innerText = `${fmtPrecio(suma)} Bs`;
        if(ivaSpan) ivaSpan.innerText = `${fmtPrecio(iva)} Bs`;
        tot.innerText = `${fmtPrecio(total)} Bs`;
        totalVenta = total;
        window.eliminarDelCarrito = i => { carrito.splice(i,1); actualizarCarritoUI(); };
    }
    function calcularCambio(){
        let pagado = parseFloat(document.getElementById('montoPagado').value);
        let cambio = document.getElementById('cambioMensaje');
        if(!isNaN(pagado) && pagado >= totalVenta) cambio.innerHTML = `Cambio: ${fmtPrecio(pagado - totalVenta)} Bs`;
        else cambio.innerHTML = 'Monto insuficiente';
    }
    async function finalizarVenta(){
        if(carrito.length === 0) {
            alert("Carrito vacío");
            return;
        }
        
        let pagado = totalVenta;
        if(tipoPago === 'efectivo_bs') {
            pagado = parseFloat(document.getElementById('montoPagado')?.value);
            if(isNaN(pagado) || pagado < totalVenta) {
                alert("Monto insuficiente");
                return;
            }
        }
        
        for(let it of carrito){
            let prod = D.productos.find(p => p.id === it.id);
            if(!prod || prod.stock < it.cantidad) {
                alert(`Stock insuficiente para ${it.nombre}`);
                return;
            }
        }
        
        for(let it of carrito){
            let prod = D.productos.find(p => p.id === it.id);
            prod.stock -= it.cantidad;
            await saveItem('productos', prod);
            let idx = D.productos.findIndex(p => p.id === it.id);
            if(idx !== -1) D.productos[idx].stock = prod.stock;
        }
        
        let ahora = new Date();
        let codigo = `${ahora.getFullYear()}${(ahora.getMonth()+1).toString().padStart(2,'0')}${ahora.getDate().toString().padStart(2,'0')}-${ahora.getHours().toString().padStart(2,'0')}${ahora.getMinutes().toString().padStart(2,'0')}${ahora.getSeconds().toString().padStart(2,'0')}`;
        let clienteId = document.getElementById('clienteSelect').value;
        let clienteNombre = clienteId ? (D.clientes.find(c => c.id === clienteId)?.nombre || 'Cliente ocasional') : 'Cliente ocasional';
        let itemsVenta = carrito.map(i => ({
            idProducto: i.id, nombre: i.nombre, cantidad: i.cantidad, precioUnitario: i.precioVentaBs,
            costoUnitario: i.costoRealBs || 0, subtotal: i.precioVentaBs * i.cantidad,
            ganancia: (i.precioVentaBs - (i.costoRealBs || 0)) * i.cantidad
        }));
        let subtotalVenta = itemsVenta.reduce((s,i) => s + i.subtotal, 0);
        let ivaVenta = D.config.ivaActivo ? subtotalVenta * 0.16 : 0;
        let gananciaTotal = itemsVenta.reduce((s,i) => s + i.ganancia, 0);
        let nuevaVenta = {
            id: codigo, fecha: ahora.toLocaleString(), timestamp: ahora.getTime(), cliente: clienteNombre,
            items: itemsVenta, subtotal: subtotalVenta, iva: ivaVenta, total: totalVenta,
            gananciaTotal: gananciaTotal, pago: pagado, cambio: pagado - totalVenta, tipoPago: tipoPago
        };
        await saveItem('ventas', nuevaVenta);
        D.ventas.push(nuevaVenta);
        
        // Mostrar ticket
        mostrarTicket(nuevaVenta);
        renderHome();
    }

    async function mostrarFormProducto(id, desdeBusqueda = false){
        let prod = id ? D.productos.find(p => p.id === id) : null;
        let esNuevo = !prod;
        let modal = document.createElement('div'); modal.className = 'modal-form';
        modal.innerHTML = `
            <div class="modal-form-content">
                <h3 class="text-xl font-bold mb-4">${esNuevo ? 'Nuevo Producto' : 'Editar Producto'}</h3>
                <div class="mb-3"><label>Nombre</label><input id="nombre" value="${escapeHtml(prod?.nombre||'')}" class="border rounded-xl p-2 w-full"></div>
                <div class="mb-3"><label>Código</label><input id="codigo" value="${escapeHtml(prod?.codigo||'')}" class="border rounded-xl p-2 w-full"></div>
                <div class="mb-3"><label>Categoría</label><input id="categoria" value="${escapeHtml(prod?.categoria||'')}" class="border rounded-xl p-2 w-full"></div>
                <div class="mb-3"><label>Proveedor</label><input id="proveedor" value="${escapeHtml(prod?.proveedor||'')}" class="border rounded-xl p-2 w-full"></div>
                <div class="mb-3"><label>Stock</label><input type="number" id="stock" value="${prod?.stock||0}" class="border rounded-xl p-2 w-full"></div>
                <div class="mb-3"><label>Costo Real (Bs)</label><input type="number" id="costoReal" step="any" value="${prod?.costoRealBs||0}" class="border rounded-xl p-2 w-full"></div>
                <div class="mb-3"><label>Precio Venta (Bs)</label><input type="number" id="ventaBs" step="any" value="${prod?.precioVentaBs||''}" class="border rounded-xl p-2 w-full"></div>
                <div class="mb-3"><label>Precio Venta (USD)</label><input type="number" id="ventaUsd" step="any" value="${prod?.precioVentaUsd||''}" class="border rounded-xl p-2 w-full"></div>
                <div class="flex gap-3 mt-4"><button id="guardarBtn" class="btn-azul-redondeado btn-redondeado flex-1 py-2 font-bold">Guardar</button><button id="cancelarBtn" class="btn-redondeado flex-1 py-2 bg-gray-200">Cancelar</button></div>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('cancelarBtn').onclick = () => modal.remove();
        let ventaBs = document.getElementById('ventaBs'), ventaUsd = document.getElementById('ventaUsd'), costoReal = document.getElementById('costoReal');
        let tasa = () => D.config.dolarRate;
        ventaBs.oninput = () => { let bs = parseFloat(ventaBs.value); if(!isNaN(bs)) ventaUsd.value = (bs / tasa()).toFixed(2); };
        ventaUsd.oninput = () => { let usd = parseFloat(ventaUsd.value); if(!isNaN(usd)) ventaBs.value = (usd * tasa()).toFixed(2); };
        document.getElementById('guardarBtn').onclick = async () => {
            let precioVentaBs = parseFloat(ventaBs.value) || 0;
            let precioVentaUsd = parseFloat(ventaUsd.value) || 0;
            let costoRealBs = parseFloat(costoReal.value) || 0;
            if(precioVentaBs > 0) precioVentaUsd = precioVentaBs / tasa();
            else if(precioVentaUsd > 0) precioVentaBs = precioVentaUsd * tasa();
            let nuevo = {
                id: esNuevo ? 'p'+Date.now() : prod.id,
                nombre: document.getElementById('nombre').value,
                codigo: document.getElementById('codigo').value,
                categoria: document.getElementById('categoria').value,
                proveedor: document.getElementById('proveedor').value,
                stock: parseInt(document.getElementById('stock').value) || 0,
                precioVentaBs, precioVentaUsd: precioVentaUsd.toFixed(2),
                costoRealBs: costoRealBs
            };
            if(esNuevo){ await saveItem('productos', nuevo); D.productos.push(nuevo); }
            else{ let idx = D.productos.findIndex(p => p.id === prod.id); D.productos[idx] = nuevo; await saveItem('productos', nuevo); }
            modal.remove();
            if(desdeBusqueda) renderHome(); else renderInventario();
        };
    }

        let search = document.getElementById('searchCrud'), agregar = document.getElementById('agregarBtn');
        let renderLista = filtro => {
            let filt = items.filter(i => { let val = i[campos[0]] || ''; return val.toString().toLowerCase().includes(filtro); });
            let cont = document.getElementById('listaCrud'); if(!cont) return;
            if(!filt.length){ cont.innerHTML = '<div class="text-center py-4 text-gray-500">No hay registros</div>'; return; }
            cont.innerHTML = filt.map(i => {
                let detalles = '';
                if(store === 'clientes') detalles = `<div class="text-xs text-gray-500 mt-1">📞 ${escapeHtml(i.telefono||'')} | ✉️ ${escapeHtml(i.email||'')}</div>`;
                else if(store === 'proveedores') detalles = `<div class="text-xs text-gray-500 mt-1">📞 ${escapeHtml(i.telefono||'')} | 👤 ${escapeHtml(i.contacto||'')}</div>`;
                else if(store === 'gastos') detalles = `<div class="text-xs text-gray-500 mt-1">💰 ${fmtPrecio(i.montoBs||0)} Bs | 📅 ${escapeHtml(i.fecha||'')}</div>`;
                else if(store === 'empleados') detalles = `<div class="text-xs text-gray-500 mt-1">💼 ${escapeHtml(i.cargo||'')} | 💵 ${fmtPrecio(i.salarioBs||0)} Bs</div>`;
                return `<div class="client-card" data-id="${i.id}"><div class="font-bold break-words">${escapeHtml((i[campos[0]]||'Sin nombre').toString())}</div>${detalles}<div class="flex gap-2 mt-2"><button class="btn-editar-item btn-editar-redondeado">✏️ Editar</button><button class="btn-eliminar-item btn-eliminar-redondeado">🗑️ Eliminar</button></div></div>`;
            }).join('');
            document.querySelectorAll('.btn-editar-item').forEach((btn, idx) => { let it = filt[idx]; btn.onclick = () => mostrarFormCrud(store, it.id, campos); });
            document.querySelectorAll('.btn-eliminar-item').forEach((btn, idx) => { let it = filt[idx]; btn.onclick = () => eliminarItemCrud(store, it.id); });
        };
        search.oninput = e => renderLista(e.target.value.toLowerCase());
        agregar.onclick = () => mostrarFormCrud(store, null, campos);
        renderLista('');
    }
    async function mostrarFormCrud(store, id, campos){
        let items = D[store], item = id ? items.find(i => i.id === id) : null;
        let modal = document.createElement('div'); modal.className = 'modal-form';
        let nombres = { cedula:'Cédula/RIF', nombre:'Nombre', telefono:'Teléfono', direccion:'Dirección', email:'Email', rif:'RIF', contacto:'Contacto', concepto:'Concepto', montoBs:'Monto (Bs)', categoria:'Categoría', fecha:'Fecha', cargo:'Cargo', salarioBs:'Salario (Bs)', fechaContrato:'Fecha Contrato' };
        let camposHtml = '';
        for(let i=0; i<campos.length; i++){
            let key = campos[i], valor = item ? (item[key]||'') : '';
            camposHtml += `<div class="mb-3"><label>${nombres[key]||key}</label><input id="field${i}" value="${escapeHtml(valor.toString())}" class="border rounded-xl p-2 w-full"></div>`;
        }
        let tituloModal = id ? 'Editar' : 'Nuevo';
        let subtitulo = store === 'clientes' ? 'Cliente' : (store === 'proveedores' ? 'Proveedor' : (store === 'gastos' ? 'Gasto' : 'Empleado'));
        modal.innerHTML = `<div class="modal-form-content"><h3 class="text-xl font-bold mb-4">${tituloModal} ${subtitulo}</h3>${camposHtml}<div class="flex gap-3 mt-4"><button id="guardarCrud" class="btn-azul-redondeado btn-redondeado flex-1 py-2 font-bold">Guardar</button><button id="cancelarCrud" class="btn-redondeado flex-1 py-2 bg-gray-200">Cancelar</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById('cancelarCrud').onclick = () => modal.remove();
        document.getElementById('guardarCrud').onclick = async () => {
            let nuevo = { id: id || (store === 'clientes' ? 'c' : (store === 'proveedores' ? 'pr' : (store === 'gastos' ? 'g' : 'e'))) + Date.now() + '_' + Date.now() };
            for(let i=0; i<campos.length; i++) nuevo[campos[i]] = document.getElementById(`field${i}`).value;
            if(store === 'gastos') nuevo.montoBs = parseFloat(nuevo.montoBs) || 0;
            if(store === 'empleados') nuevo.salarioBs = parseFloat(nuevo.salarioBs) || 0;
            await saveItem(store, nuevo);
            if(id){ let idx = D[store].findIndex(i => i.id === id); if(idx !== -1) D[store][idx] = nuevo; }
            else D[store].push(nuevo);
            modal.remove();
            if(store === 'clientes') renderCrud('clientes','Clientes',campos);
            else if(store === 'proveedores') renderCrud('proveedores','Proveedores',campos);
            else if(store === 'gastos') renderCrud('gastos','Gastos',campos);
            else if(store === 'empleados') renderCrud('empleados','Empleados',campos);
        };
    }
    async function eliminarItemCrud(store, id){
        if(confirm('¿Eliminar este elemento?')){
            await deleteItem(store, id);
            D[store] = D[store].filter(i => i.id !== id);
            if(store === 'clientes') renderCrud('clientes','Clientes',['cedula','nombre','telefono','direccion','email']);
            else if(store === 'proveedores') renderCrud('proveedores','Proveedores',['rif','nombre','telefono','contacto','direccion']);
            else if(store === 'gastos') renderCrud('gastos','Gastos',['concepto','montoBs','categoria','fecha']);
            else if(store === 'empleados') renderCrud('empleados','Empleados',['cedula','nombre','cargo','salarioBs','fechaContrato']);
        }
    }
    
    // ==================== REPORTES ====================
    async function renderReportes(){
        let ventas = await getAll('ventas');
        let totalVentas = ventas.reduce((a,b)=>a+(b.total||0),0);
        let totalGanancia = ventas.reduce((a,b)=>a+(b.gananciaTotal||0),0);
        let totalGastos = D.gastos.reduce((a,b)=>a+(b.montoBs||0),0);
        let bloqueado = volverBloqueado, accent = D.config.theme;
        document.getElementById('appRoot').innerHTML = `
            <div class="page-header-fixed"><div class="module-header"><h2 id="tituloModule" class="module-title ${bloqueado?'module-title-bloqueado':''}" style="color:${accent}" onmousedown="iniciarBloqueo(this,'Reportes')" onmouseup="cancelarBloqueo()" onmouseleave="cancelarBloqueo()">Reportes</h2><div id="btnVolverModule" class="btn-back ${bloqueado?'btn-back-bloqueado':''}" onclick="${bloqueado?'':'backToHome()'}">${bloqueado?'<i class="fas fa-lock"></i> Bloqueado':'<i class="fas fa-arrow-left"></i> Volver'}</div></div></div>
            <div class="page-container"><div class="p-3 rounded-xl mb-3" style="background:rgba(0,0,0,0.05)"><p>💰 Ventas totales: ${fmtPrecio(totalVentas)} Bs</p><p>📈 Ganancia bruta: ${fmtPrecio(totalGanancia)} Bs</p><p>💸 Gastos totales: ${fmtPrecio(totalGastos)} Bs</p><p>📊 Utilidad neta: ${fmtPrecio(totalGanancia - totalGastos)} Bs</p></div><h3 class="font-bold mb-2">Últimas ventas</h3><div class="max-h-64 overflow-auto">${ventas.slice().reverse().map(v => `<div class="border-b py-2 text-sm cursor-pointer hover:bg-gray-100 hover:opacity-80" onclick="window.mostrarTicketDesdeReporte('${v.id}')"><b>${escapeHtml(v.id)}</b> - ${escapeHtml(v.fecha)}<br>Cliente: ${escapeHtml(v.cliente)} | Total: ${fmtPrecio(v.total)} Bs<br>Tipo pago: ${escapeHtml(v.tipoPago||'efectivo_bs')}<br>Items: ${v.items.map(i=>`${escapeHtml(i.nombre)} x${i.cantidad}`).join(', ')}</div>`).join('')}</div></div>
        `;
        if(volverBloqueado) document.getElementById('btnVolverModule').onclick = () => {};
    }
    
    window.mostrarTicketDesdeReporte = (ventaId) => {
        const venta = D.ventas.find(v => v.id === ventaId);
        if(venta) mostrarTicket(venta);
    };
    
    // ==================== CONFIGURACIÓN ====================
    async function renderConfig(){
        let colores = ['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444','#ec4899','#000000','#22c55e','#a855f7','#f97316','#ff69b4','#00ced1'];
        let fondos = [{id:'light',nombre:'Blanco'},{id:'gray',nombre:'Grisáceo'},{id:'dark',nombre:'Negro'}];
        let bloqueado = volverBloqueado, accent = D.config.theme;
        document.getElementById('appRoot').innerHTML = `
            <div class="page-header-fixed"><div class="module-header"><h2 id="tituloModule" class="module-title ${bloqueado?'module-title-bloqueado':''}" style="color:${accent}" onmousedown="iniciarBloqueo(this,'Configuración')" onmouseup="cancelarBloqueo()" onmouseleave="cancelarBloqueo()">Configuración</h2><div id="btnVolverModule" class="btn-back ${bloqueado?'btn-back-bloqueado':''}" onclick="${bloqueado?'':'backToHome()'}">${bloqueado?'<i class="fas fa-lock"></i> Bloqueado':'<i class="fas fa-arrow-left"></i> Volver'}</div></div></div>
            <div class="page-container"><div class="config-section"><h3 class="font-bold mb-3 text-center">⚙️ Opciones generales</h3><div class="flex flex-wrap justify-center gap-4"><label class="flex items-center gap-2"><span class="font-semibold">IVA 16%</span><input type="checkbox" id="toggleIVA" ${D.config.ivaActivo?'checked':''}></label><label class="flex items-center gap-2"><span class="font-semibold">Margen ganancia</span><input type="checkbox" id="toggleMargen" ${D.config.usarMargen?'checked':''}></label></div></div><div class="config-section"><h3 class="font-bold mb-3 text-center">🎨 Temas de color</h3><div class="flex flex-wrap justify-center gap-2" id="paletaColores"></div></div><div class="config-section"><h3 class="font-bold mb-3 text-center">🖌️ Fondos de contraste</h3><div class="flex justify-center gap-4 flex-wrap">${fondos.map(f => `<div class="bg-option ${D.config.backgroundMode===f.id?'selected':''}" style="background:${f.id==='light'?'#ffffff':f.id==='gray'?'#2c2c2c':'#000000'}; border:2px solid var(--accent);" data-mode="${f.id}"><div class="text-center text-xs" style="color:${f.id==='light'?'#000':'#fff'}">${f.nombre}</div></div>`).join('')}</div></div><div class="mt-4 text-xs text-center">💰 POS Profesional - Datos locales</div></div>
        `;
        if(volverBloqueado) document.getElementById('btnVolverModule').onclick = () => {};
        let paleta = document.getElementById('paletaColores');
        colores.forEach(c => {
            let circle = document.createElement('div'); circle.className = 'color-circle'; circle.style.backgroundColor = c;
            circle.onclick = async () => { D.config.theme = c; if(esOscuro(c)) D.config.backgroundMode = 'light'; await saveConfig(); renderConfig(); };
            paleta.appendChild(circle);
        });
        document.querySelectorAll('.bg-option').forEach(opt => {
            opt.onclick = async () => {
                let nuevo = opt.getAttribute('data-mode');
                if(esOscuro(D.config.theme) && nuevo === 'dark') return;
                D.config.backgroundMode = nuevo; await saveConfig(); renderConfig();
            };
        });
        document.getElementById('toggleIVA').onchange = async e => { D.config.ivaActivo = e.target.checked; await saveConfig(); };
        document.getElementById('toggleMargen').onchange = async e => { D.config.usarMargen = e.target.checked; await saveConfig(); renderConfig(); };
    }
    
    // ==================== PWA ====================
    (function setupPWA() {
        const generarIcono = (size, bgColor = D.config.theme, textColor = '#ffffff') => {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, size, size);
            ctx.fillStyle = textColor;
            ctx.font = `bold ${size * 0.45}px "Inter", system-ui, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('JAM', size/2, size/2);
            return canvas.toDataURL('image/png');
        };
        const iconSizes = [72, 96, 128, 144, 152, 192, 384, 512];
        const icons = iconSizes.map(size => ({ src: generarIcono(size, D.config.theme, '#ffffff'), sizes: `${size}x${size}`, type: 'image/png' }));
        const manifest = { name: "JAM POS - Tienda Profesional", short_name: "JAM POS", description: "Sistema de punto de venta profesional", start_url: ".", display: "standalone", theme_color: D.config.theme, background_color: "#ffffff", icons: icons };
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        document.querySelector('link[rel="manifest"]').setAttribute('href', URL.createObjectURL(manifestBlob));
        const swCode = `const CACHE_NAME='jampos-v23';const iconUrls=${JSON.stringify(icons.map(i=>i.src))};self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE_NAME).then(c=>c.addAll(['/','https://cdn.tailwindcss.com','https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css','https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js',...iconUrls])));self.skipWaiting();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/'))));});`;
        navigator.serviceWorker.register(URL.createObjectURL(new Blob([swCode],{type:'application/javascript'})));
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; if(!document.querySelector('.install-btn')){ let btn = document.createElement('button'); btn.innerText = '📲 Instalar App'; btn.className = 'install-btn'; btn.style.background = D.config.theme; btn.style.color = '#ffffff'; btn.onclick = () => { if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt.userChoice.then(()=>btn.remove()); } else btn.remove(); }; document.body.appendChild(btn); } });
    })();
    
    (async () => { await initDB(); await loadAllData(); await actualizarTasa(); renderHome(); })();
</script>
</body>
