<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión - JAM POS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100dvh; background: #f8fafc; color: #1e293b;
      padding: 2rem; text-align: center;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #64748b; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block; padding: 0.75rem 2rem;
      border-radius: 999px; border: none; font-weight: 600;
      cursor: pointer; font-size: 0.9rem;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #f1f5f9; }
      p { color: #94a3b8; }
    }
  </style>
</head>
<body>
  <div>
    <h1>Sin conexión a internet</h1>
    <p>Vuelve a conectarte para acceder al contenido actualizado.<br>Los datos guardados localmente están disponibles.</p>
    <button class="btn btn-primary" onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
